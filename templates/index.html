<!DOCTYPE html>
<html>
<head>
    <title>Pencarian Alumni</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body style="background:#f5f7fa;">

<div class="container mt-5">

<h1 class="text-center mb-4">🔍 Sistem Pencarian Alumni</h1>

<div class="card p-4 shadow">

    <div class="row">
        <div class="col-md-4"><input id="name" class="form-control mb-2" placeholder="Nama Lulusan"></div>
        <div class="col-md-4"><input id="nim" class="form-control mb-2" placeholder="NIM"></div>
        <div class="col-md-4"><input id="tahun_masuk" class="form-control mb-2" placeholder="Tahun Masuk"></div>
        <div class="col-md-4"><input id="tanggal_lulus" class="form-control mb-2" placeholder="Tanggal Lulus"></div>
        <div class="col-md-4"><input id="fakultas" class="form-control mb-2" placeholder="Fakultas"></div>
        <div class="col-md-4"><input id="prodi" class="form-control mb-2" placeholder="Program Studi"></div>
    </div>

    <button onclick="searchAlumni()" class="btn btn-primary w-100 mt-3">Cari Alumni</button>

</div>

<div class="mt-4">
    <table class="table table-bordered table-striped">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Nama</th>
                <th>NIM</th>
                <th>Tahun Masuk</th>
                <th>Tanggal Lulus</th>
                <th>Fakultas</th>
                <th>Prodi</th>
            </tr>
        </thead>
        <tbody id="result"></tbody>
    </table>
</div>

</div>

<script>
function searchAlumni() {
    let name = document.getElementById("name").value;
    let nim = document.getElementById("nim").value;
    let tahun_masuk = document.getElementById("tahun_masuk").value;
    let tanggal_lulus = document.getElementById("tanggal_lulus").value;
    let fakultas = document.getElementById("fakultas").value;
    let prodi = document.getElementById("prodi").value;

    fetch(`/search?name=${name}&nim=${nim}&tahun_masuk=${tahun_masuk}&tanggal_lulus=${tanggal_lulus}&fakultas=${fakultas}&prodi=${prodi}`)
        .then(res => res.json())
        .then(data => {
            let table = "";
            if (data.length === 0) {
                table = "<tr><td colspan='7' class='text-center'>Data tidak ditemukan</td></tr>";
            } else {
                data.forEach(item => {
                    table += `<tr>
                        <td>${item[0]}</td>
                        <td>${item[1]}</td>
                        <td>${item[2]}</td>
                        <td>${item[3]}</td>
                        <td>${item[4]}</td>
                        <td>${item[5]}</td>
                        <td>${item[6]}</td>
                    </tr>`;
                });
            }
            document.getElementById("result").innerHTML = table;
        });
}
</script>

</body>
</html>
